model:
  num_heads: 8
  num_transformer_layers: 4
  num_classes: 20

train:
  batch_size: 16
  num_epochs: 100
  learning_rate: 0.0002
  seq_len: 60
  log_interval: 5
  wandb: "yes"
  early_stopping: "yes"
  early_stopping_patience: 15
  lr_scheduler_patience: 10
  weight_decay: 0.0001
  output_dir: "output/custom_models"
